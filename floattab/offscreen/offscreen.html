<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FloatTab Offscreen</title>
    <style>
      /*
       * v2.0: <video> elements are now created dynamically by offscreen.js,
       * one per mirrored tab. Each is positioned off-screen via inline styles
       * set at creation time. This rule provides a defensive baseline for
       * any video elements that may appear in this document.
       */
      body { margin: 0; background: #000; overflow: hidden; }
      video { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }
    </style>
  </head>
  <body>
    <!--
      v2.0: No static <video> element. offscreen.js creates and removes
      <video> elements dynamically — one per concurrently-mirrored tab.
    -->
    <script src="offscreen.js"></script>
  </body>
</html>
